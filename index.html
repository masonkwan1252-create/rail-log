<!DOCTYPE html>
<html lang="zh-HK">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Rail Log V0.05.3b</title>

<style>

*{
box-sizing:border-box;
}

:root{
--bg:#f2f2f2;
--card:#ffffff;
--text:#000;
--border:#eee;
}

@media (prefers-color-scheme: dark){

:root{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--border:#333;
}

}

body{
font-family:-apple-system;
background:var(--bg);
color:var(--text);
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.card{
background:var(--card);
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
margin-bottom:10px;
box-sizing:border-box;
}

input[type=date]{
max-width:100%;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:5px 10px;
margin-right:6px;
font-size:14px;
}

.trip{
border-bottom:1px solid var(--border);
padding:8px 0;
}

.route{
font-weight:bold;
}

.date{
font-weight:bold;
margin-top:10px;
}

.clickable{
color:#007aff;
cursor:pointer;
}

</style>

</head>

<body>

<header>🚆 Rail Log V0.05.3b</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">

<label>路線</label>
<input id="line" list="lineList">

<label>車型</label>
<input id="train">

<label>上車站</label>
<input id="from" list="stationList">

<label>下車站</label>
<input id="to" list="stationList">

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>

<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>
<div id="companyStats"></div>
<div id="lineStats"></div>
<div id="trainStats"></div>
<div id="stationStats"></div>

</div>

</div>

<datalist id="companyList"></datalist>
<datalist id="lineList"></datalist>
<datalist id="stationList"></datalist>

<script>

let trips=JSON.parse(localStorage.getItem("railTrips")||"[]")

let companies=[]
let lines=[]
let stations=[]

date.valueAsDate=new Date()

async function loadData(){

companies=await fetch("companies.json").then(r=>r.json())
lines=await fetch("lines.json").then(r=>r.json())
stations=await fetch("stations.json").then(r=>r.json())

fillList("companyList",companies)
fillList("stationList",stations)

}

function fillList(id,data){

const list=document.getElementById(id)

list.innerHTML=""

data.forEach(v=>{

const o=document.createElement("option")
o.value=v
list.appendChild(o)

})

}

company.addEventListener("input",()=>{

const list=document.getElementById("lineList")

list.innerHTML=""

lines.filter(l=>l.company===company.value).forEach(l=>{

const o=document.createElement("option")
o.value=l.name
list.appendChild(o)

})

})

function saveTrip(){

const trip={

date:date.value,
company:company.value,
line:line.value,
train:train.value,
from:from.value,
to:to.value

}

trips.push(trip)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

function render(){

tripList.innerHTML=""

trips.forEach(t=>{

const div=document.createElement("div")

div.className="trip"

div.innerHTML=`

<div class="date">${t.date}</div>

<div class="route">${t.company} ${t.line}</div>

${t.train}<br>

${t.from} → ${t.to}

`

tripList.appendChild(div)

})

stats()

}

function toggle(id){

const e=document.getElementById(id)

e.style.display=e.style.display==="none"?"block":"none"

}

function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let lineCount={}
let trainCount={}
let stationCount={}

trips.forEach(t=>{

companyCount[t.company]=(companyCount[t.company]||0)+1
lineCount[t.line]=(lineCount[t.line]||0)+1
trainCount[t.train]=(trainCount[t.train]||0)+1

stationCount[t.from]=(stationCount[t.from]||0)+1
stationCount[t.to]=(stationCount[t.to]||0)+1

})

renderStat("companyStats","鉄道公司",companyCount)
renderStat("lineStats","路線",lineCount)
renderStat("trainStats","車型",trainCount)
renderStat("stationStats","車站",stationCount)

}

function renderStat(id,title,data){

const entries=Object.entries(data).sort((a,b)=>b[1]-a[1])

const block=id+"_detail"

let html=`<b>${title}</b>：<span class="clickable" onclick="toggle('${block}')">${entries.length}</span>`

html+=`<div id="${block}" style="display:none">`

entries.forEach(e=>{

html+=`${e[0]} (${e[1]})<br>`

})

html+="</div>"

document.getElementById(id).innerHTML=html

}

loadData()

render()

</script>

</body>
</html>
