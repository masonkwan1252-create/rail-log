<!DOCTYPE html>
<html lang="zh-HK">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rail Log V0.05.3c</title>

<style>

*{
box-sizing:border-box;
}

:root{
--bg:#f2f2f2;
--card:#ffffff;
--text:#000;
--border:#ddd;
}

@media (prefers-color-scheme: dark){

:root{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--border:#333;
}

}

body{
margin:0;
font-family:-apple-system;
background:var(--bg);
color:var(--text);
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
max-width:600px;
margin:auto;
padding:12px;
}

.card{
background:var(--card);
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
margin-bottom:10px;
}

input[type="date"]{
width:100%;
max-width:100%;
display:block;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:5px 10px;
font-size:14px;
margin-right:5px;
}

.trip{
border-bottom:1px solid var(--border);
padding:8px 0;
}

.route{
font-weight:bold;
}

.date{
font-weight:bold;
margin-top:8px;
}

.clickable{
color:#007aff;
cursor:pointer;
}

</style>

</head>

<body>

<header>🚆 Rail Log V0.05.3c</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">

<label>路線</label>
<input id="line" list="lineList">

<button onclick="addThrough()">直通</button>

<div id="throughContainer"></div>

<label>車型</label>
<input id="train">

<label>上車站</label>
<input id="from" list="stationList">

<label>下車站</label>
<input id="to" list="stationList">

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>

<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>
<div id="companyStats"></div>
<div id="lineStats"></div>
<div id="trainStats"></div>
<div id="stationStats"></div>

</div>

<div class="card">

<h3>資料管理</h3>

<button onclick="exportData()">匯出資料</button>

<input type="file" id="importFile">

<button onclick="importData()">匯入資料</button>

</div>

</div>

<datalist id="companyList"></datalist>
<datalist id="lineList"></datalist>
<datalist id="stationList"></datalist>

<script>

let trips = JSON.parse(localStorage.getItem("railTrips") || "[]")

let companies=[]
let lines=[]
let stations=[]

date.valueAsDate=new Date()

// 載入資料庫
async function loadData(){

companies=await fetch("companies.json").then(r=>r.json())
lines=await fetch("lines.json").then(r=>r.json())
stations=await fetch("stations.json").then(r=>r.json())

fillList("companyList",companies)
fillList("stationList",stations)

}

function fillList(id,data){

const list=document.getElementById(id)

list.innerHTML=""

data.forEach(v=>{

const o=document.createElement("option")
o.value=v
list.appendChild(o)

})

}

// 公司篩選路線
company.addEventListener("input",()=>{

const list=document.getElementById("lineList")

list.innerHTML=""

lines.filter(l=>l.company===company.value).forEach(l=>{

const o=document.createElement("option")
o.value=l.name
list.appendChild(o)

})

})

// 直通功能
function addThrough(){

const div=document.createElement("div")

div.innerHTML=`

<input class="throughCompany" list="companyList" placeholder="直通公司">

<input class="throughLine" list="lineList" placeholder="直通路線">

<button onclick="addThrough()">直通</button>

`

throughContainer.appendChild(div)

}

// 儲存
function saveTrip(){

let routes=[]

routes.push({
company:company.value,
line:line.value
})

document.querySelectorAll(".throughCompany").forEach((c,i)=>{

routes.push({
company:c.value,
line:document.querySelectorAll(".throughLine")[i].value
})

})

const trip={

date:date.value,
routes:routes,
train:train.value,
from:from.value,
to:to.value

}

trips.push(trip)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

// render
function render(){

tripList.innerHTML=""

trips.forEach(t=>{

const div=document.createElement("div")

div.className="trip"

div.innerHTML=`

<div class="date">${t.date}</div>

<div class="route">${t.routes.map(r=>r.company+" "+r.line).join(" → ")}</div>

${t.train}<br>

${t.from} → ${t.to}

`

tripList.appendChild(div)

})

stats()

}

function toggle(id){

const e=document.getElementById(id)

e.style.display=e.style.display==="none"?"block":"none"

}

// 統計
function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let lineCount={}
let trainCount={}
let stationCount={}

trips.forEach(t=>{

t.routes.forEach(r=>{

companyCount[r.company]=(companyCount[r.company]||0)+1
lineCount[r.line]=(lineCount[r.line]||0)+1

})

trainCount[t.train]=(trainCount[t.train]||0)+1

stationCount[t.from]=(stationCount[t.from]||0)+1
stationCount[t.to]=(stationCount[t.to]||0)+1

})

renderStat("companyStats","鉄道公司",companyCount)
renderStat("lineStats","路線",lineCount)
renderStat("trainStats","車型",trainCount)
renderStat("stationStats","車站",stationCount)

}

function renderStat(id,title,data){

const entries=Object.entries(data).sort((a,b)=>b[1]-a[1])

const block=id+"_detail"

let html=`<b>${title}</b>：<span class="clickable" onclick="toggle('${block}')">${entries.length}</span>`

html+=`<div id="${block}" style="display:none">`

entries.forEach(e=>{

html+=`${e[0]} (${e[1]})<br>`

})

html+="</div>"

document.getElementById(id).innerHTML=html

}

// 匯出
function exportData(){

const blob=new Blob([JSON.stringify(trips,null,2)],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="rail-log-backup.json"

a.click()

}

// 匯入
function importData(){

const file=document.getElementById("importFile").files[0]

if(!file)return

const reader=new FileReader()

reader.onload=e=>{

trips=JSON.parse(e.target.result)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

reader.readAsText(file)

}

loadData()

render()

</script>

</body>

</html>
