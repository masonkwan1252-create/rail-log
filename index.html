<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rail Log V6</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#f3f3f3;
}

header{
background:#222;
color:white;
padding:16px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:6px 10px;
margin-right:8px;
font-size:14px;
}

.trip{
border-bottom:1px solid #eee;
padding:8px 0;
}

.dategroup{
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<header>🚆 Rail Log V6</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companies">

<label>路線</label>
<input id="line" list="lines">

<label>車型</label>
<input id="train" placeholder="E233-0 / キハ40">

<label>上車站</label>
<input id="from" list="stations">

<label>下車站</label>
<input id="to" list="stations">

<datalist id="stations"></datalist>
<datalist id="lines"></datalist>
<datalist id="companies"></datalist>

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>
<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>
<div id="companyStats"></div>
<div id="trainStats"></div>

<h4>到訪車站</h4>
<div id="stationCount"></div>
<div id="stationTop"></div>

<button onclick="exportData()">Export JSON</button>

</div>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("railTrips")||"[]")
let editIndex=null

date.valueAsDate=new Date()

async function loadData(){

let stations=await (await fetch("stations.json")).json()
let lines=await (await fetch("lines.json")).json()
let companies=await (await fetch("companies.json")).json()

fillList("stations",stations)
fillList("lines",lines)
fillList("companies",companies)

}

function fillList(id,data){

let list=document.getElementById(id)

data.forEach(v=>{

let opt=document.createElement("option")
opt.value=v
list.appendChild(opt)

})

}

loadData()

function saveTrip(){

let trip={
date:date.value,
company:company.value,
line:line.value,
train:train.value,
from:from.value,
to:to.value
}

if(editIndex!==null){
trips[editIndex]=trip
editIndex=null
}else{
trips.push(trip)
}

localStorage.setItem("railTrips",JSON.stringify(trips))

clearForm()
render()

}

function clearForm(){

company.value=""
line.value=""
train.value=""
from.value=""
to.value=""
date.valueAsDate=new Date()

}

function deleteTrip(i){

if(confirm("刪除記錄？")){

trips.splice(i,1)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

}

function editTrip(i){

let t=trips[i]

date.value=t.date
company.value=t.company
line.value=t.line
train.value=t.train
from.value=t.from
to.value=t.to

editIndex=i

window.scrollTo({top:0,behavior:"smooth"})

}

function render(){

let list=document.getElementById("tripList")
list.innerHTML=""

let sorted=[...trips].sort((a,b)=>b.date.localeCompare(a.date))

let lastDate=""

sorted.forEach(t=>{

let i=trips.indexOf(t)

if(t.date!==lastDate){

let d=document.createElement("div")
d.className="dategroup"
d.innerText=t.date
list.appendChild(d)

lastDate=t.date

}

let div=document.createElement("div")
div.className="trip"

div.innerHTML=
t.company+" "+t.line+" "+t.train+
"<br>"+t.from+" → "+t.to+
"<br>"+
"<button class='smallbtn' onclick='editTrip("+i+")'>✏️修改</button>"+
"<button class='smallbtn' onclick='deleteTrip("+i+")'>🗑刪除</button>"

list.appendChild(div)

})

stats()

}

function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let trainCount={}
let stationCount={}

trips.forEach(t=>{

companyCount[t.company]=(companyCount[t.company]||0)+1

let type=t.train.split("-")[0]
trainCount[type]=(trainCount[type]||0)+1

stationCount[t.from]=(stationCount[t.from]||0)+1
stationCount[t.to]=(stationCount[t.to]||0)+1

})

let ctext="鉄道公司： "

for(let c in companyCount){
ctext+=c+"("+companyCount[c]+") "
}

companyStats.innerText=ctext

let ttext="車型： "

for(let t in trainCount){
ttext+=t+"("+trainCount[t]+") "
}

trainStats.innerText=ttext

let stations=Object.entries(stationCount)

stationCount.innerText="到訪車站："+stations.length

stations.sort((a,b)=>b[1]-a[1])

let topHTML=""

stations.slice(0,10).forEach(s=>{
topHTML+=s[0]+" ("+s[1]+")<br>"
})

stationTop.innerHTML=topHTML

}

function exportData(){

let dataStr=JSON.stringify(trips,null,2)

let blob=new Blob([dataStr],{type:"application/json"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="rail-log.json"
a.click()

}

render()

</script>

</body>
</ht
