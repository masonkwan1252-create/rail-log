<!DOCTYPE html>
<html lang="zh-HK">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rail Log V0.05.3</title>

<style>

:root{
--bg:#f2f2f2;
--card:#ffffff;
--text:#000;
--border:#eee;
}

@media (prefers-color-scheme: dark){

:root{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--border:#333;
}

}

body{
font-family:-apple-system;
background:var(--bg);
color:var(--text);
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:var(--card);
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:5px 10px;
margin-right:6px;
font-size:14px;
}

.trip{
border-bottom:1px solid var(--border);
padding:8px 0;
}

.route{
font-weight:bold;
}

.date{
font-weight:bold;
margin-top:10px;
}

.clickable{
color:#007aff;
cursor:pointer;
}

</style>

</head>

<body>

<header>🚆 Rail Log V0.05.3</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">

<label>路線</label>
<input id="line" list="lineList">

<button onclick="addThrough()">直通</button>

<div id="throughContainer"></div>

<label>車型</label>
<input id="train">

<label>上車站</label>
<input id="from" list="stationList">

<label>下車站</label>
<input id="to" list="stationList">

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>

<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>
<div id="companyStats"></div>
<div id="lineStats"></div>
<div id="trainStats"></div>
<div id="stationStats"></div>

</div>

<div class="card">

<h3>資料管理</h3>

<button onclick="exportData()">匯出資料</button>

<input type="file" id="importFile">

<button onclick="importData()">匯入資料</button>

</div>

</div>

<datalist id="companyList"></datalist>
<datalist id="lineList"></datalist>
<datalist id="stationList"></datalist>

<script>

let trips=JSON.parse(localStorage.getItem("railTrips")||"[]")

let editIndex=null

date.valueAsDate=new Date()

// 匯出
function exportData(){

const dataStr=JSON.stringify(trips,null,2)

const blob=new Blob([dataStr],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="rail-log-backup.json"

a.click()

}

// 匯入
function importData(){

const file=document.getElementById("importFile").files[0]

if(!file)return

const reader=new FileReader()

reader.onload=e=>{

trips=JSON.parse(e.target.result)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

reader.readAsText(file)

}

// 直通
function addThrough(){

const div=document.createElement("div")

div.innerHTML=`

<input class="throughCompany" list="companyList" placeholder="直通公司">

<input class="throughLine" list="lineList" placeholder="直通路線">

<button onclick="addThrough()">直通</button>

`

throughContainer.appendChild(div)

}

// 車型標準化
function normalizeTrain(t){

let m=t.match(/^([A-Za-z]*\d+)[\-]?(\d+)$/)

if(m)return m[1]+"系"+m[2]+"番台"

return t

}

// 儲存
function saveTrip(){

let routes=[]

routes.push({company:company.value,line:line.value})

document.querySelectorAll(".throughCompany").forEach((c,i)=>{

routes.push({

company:c.value,
line:document.querySelectorAll(".throughLine")[i].value

})

})

const trip={

date:date.value,
routes:routes,
train:normalizeTrain(train.value),
from:from.value,
to:to.value

}

if(editIndex!==null){

trips[editIndex]=trip
editIndex=null

}else{

trips.push(trip)

}

localStorage.setItem("railTrips",JSON.stringify(trips))

throughContainer.innerHTML=""

render()

}

// render
function render(){

tripList.innerHTML=""

let lastDate=""

trips.forEach((t,i)=>{

if(t.date!==lastDate){

const d=document.createElement("div")
d.className="date"
d.innerText=t.date

tripList.appendChild(d)

lastDate=t.date

}

const div=document.createElement("div")

div.className="trip"

div.innerHTML=`

<div class="route">${t.routes.map(r=>r.company+" "+r.line).join(" → ")}</div>

${t.train}<br>

${t.from} → ${t.to}<br>

<button class="smallbtn" onclick="editTrip(${i})">修改</button>

<button class="smallbtn" onclick="deleteTrip(${i})">刪除</button>

`

tripList.appendChild(div)

})

stats()

}

// 刪除
function deleteTrip(i){

if(confirm("刪除記錄？")){

trips.splice(i,1)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

}

// toggle
function toggle(id){

const e=document.getElementById(id)

e.style.display=e.style.display==="none"?"block":"none"

}

// 統計
function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let lineCount={}
let trainCount={}
let stationCount={}

trips.forEach(t=>{

t.routes.forEach(r=>{

companyCount[r.company]=(companyCount[r.company]||0)+1
lineCount[r.line]=(lineCount[r.line]||0)+1

})

trainCount[t.train]=(trainCount[t.train]||0)+1

stationCount[t.from]=(stationCount[t.from]||0)+1
stationCount[t.to]=(stationCount[t.to]||0)+1

})

renderStat("companyStats","鉄道公司",companyCount)
renderStat("lineStats","路線",lineCount)
renderStat("trainStats","車型",trainCount)
renderStat("stationStats","車站",stationCount)

}

function renderStat(id,title,data){

const entries=Object.entries(data).sort((a,b)=>b[1]-a[1])

const block=id+"_detail"

let html=`<b>${title}</b>：<span class="clickable" onclick="toggle('${block}')">${entries.length}</span>`

html+=`<div id="${block}" style="display:none">`

entries.forEach(e=>{

html+=`${e[0]} (${e[1]})<br>`

})

html+="</div>"

document.getElementById(id).innerHTML=html

}

render()

</script>

</body>
</html>
