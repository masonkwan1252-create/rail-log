<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rail Log V0.05.2</title>

<style>

body{
font-family:-apple-system;
background:#f2f2f2;
margin:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:5px 10px;
margin-right:6px;
font-size:14px;
}

.trip{
border-bottom:1px solid #eee;
padding:8px 0;
}

.route{
font-weight:bold;
}

.clickable{
color:#007aff;
cursor:pointer;
}

.date{
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<header>🚆 Rail Log V0.05.2</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">

<label>路線</label>
<input id="line" list="lineList">

<button onclick="addThrough()">直通</button>

<div id="throughContainer"></div>

<label>車型</label>
<input id="train">

<label>上車站</label>
<input id="from" list="stationList">

<label>下車站</label>
<input id="to" list="stationList">

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>

<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>

<div id="companyStats"></div>

<div id="lineStats"></div>

<div id="trainStats"></div>

</div>

</div>

<datalist id="companyList"></datalist>
<datalist id="lineList"></datalist>
<datalist id="stationList"></datalist>

<script>

let trips = JSON.parse(localStorage.getItem("railTrips") || "[]")

let editIndex=null

let companies=[]
let lines=[]
let stations=[]

const companyColor={}

// 日期預設今日
date.valueAsDate=new Date()

// 載入資料
async function loadData(){

companies=await fetch("companies.json").then(r=>r.json())
lines=await fetch("lines.json").then(r=>r.json())
stations=await fetch("stations.json").then(r=>r.json())

fillList("companyList",companies)
fillList("stationList",stations)

}

// datalist
function fillList(id,data){

const list=document.getElementById(id)

list.innerHTML=""

data.forEach(v=>{

const o=document.createElement("option")
o.value=v
list.appendChild(o)

})

}

// 公司→路線
company.addEventListener("input",()=>{

const list=document.getElementById("lineList")

list.innerHTML=""

lines.filter(l=>l.company===company.value).forEach(l=>{

const o=document.createElement("option")
o.value=l.name
list.appendChild(o)

})

})

// 直通
function addThrough(){

const div=document.createElement("div")

div.innerHTML=`
<input class="throughCompany" list="companyList" placeholder="直通公司">
<input class="throughLine" list="lineList" placeholder="直通路線">
<button onclick="addThrough()">直通</button>
`

throughContainer.appendChild(div)

}

// 車型標準化
function normalizeTrain(t){

let m=t.match(/^([A-Za-z]*\d+)[\-]?(\d+)$/)

if(m)return m[1]+"系"+m[2]+"番台"

return t

}

// 儲存
function saveTrip(){

let routes=[]

routes.push({company:company.value,line:line.value})

document.querySelectorAll(".throughCompany").forEach((c,i)=>{

routes.push({

company:c.value,
line:document.querySelectorAll(".throughLine")[i].value

})

})

const trip={

date:date.value,
routes:routes,
train:normalizeTrain(train.value),
from:from.value,
to:to.value

}

if(editIndex!==null){

trips[editIndex]=trip
editIndex=null

}else{

trips.push(trip)

}

localStorage.setItem("railTrips",JSON.stringify(trips))

throughContainer.innerHTML=""

render()

}

// 顏色
function getColor(c){

if(!companyColor[c]){

companyColor[c]="hsl("+Math.floor(Math.random()*360)+",60%,60%)"

}

return companyColor[c]

}

// render
function render(){

tripList.innerHTML=""

let lastDate=""

trips.forEach((t,i)=>{

if(t.date!==lastDate){

const d=document.createElement("div")
d.className="date"
d.innerText=t.date

tripList.appendChild(d)

lastDate=t.date

}

let routeHTML=""

t.routes.forEach((r,idx)=>{

routeHTML+=`<span style="color:${getColor(r.company)}">${r.company} ${r.line}</span>`

if(idx<t.routes.length-1)routeHTML+=" → "

})

const div=document.createElement("div")

div.className="trip"

div.innerHTML=`

<div class="route">${routeHTML}</div>

${t.train}<br>

${t.from} → ${t.to}<br>

<button class="smallbtn" onclick="editTrip(${i})">修改</button>

<button class="smallbtn" onclick="deleteTrip(${i})">刪除</button>

`

tripList.appendChild(div)

})

stats()

}

// 修改
function editTrip(i){

const t=trips[i]

date.value=t.date
company.value=t.routes[0].company
line.value=t.routes[0].line
train.value=t.train
from.value=t.from
to.value=t.to

throughContainer.innerHTML=""

t.routes.slice(1).forEach(r=>{

addThrough()

let c=document.querySelectorAll(".throughCompany")
let l=document.querySelectorAll(".throughLine")

c[c.length-1].value=r.company
l[l.length-1].value=r.line

})

editIndex=i

}

// 刪除
function deleteTrip(i){

if(confirm("刪除記錄？")){

trips.splice(i,1)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

}

// toggle
function toggle(id){

const el=document.getElementById(id)

el.style.display=el.style.display==="none"?"block":"none"

}

// 統計
function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let lineCount={}
let trainCount={}

trips.forEach(t=>{

t.routes.forEach(r=>{

companyCount[r.company]=(companyCount[r.company]||0)+1
lineCount[r.line]=(lineCount[r.line]||0)+1

})

trainCount[t.train]=(trainCount[t.train]||0)+1

})

renderStat("companyStats","鉄道公司",companyCount)
renderStat("lineStats","路線",lineCount)
renderStat("trainStats","車型",trainCount)

}

function renderStat(id,title,data){

const entries=Object.entries(data).sort((a,b)=>b[1]-a[1])

const block=id+"_detail"

let html=`<b>${title}</b>：<span class="clickable" onclick="toggle('${block}')">${entries.length}</span>`

html+=`<div id="${block}" style="display:none">`

entries.forEach(e=>{

html+=`${e[0]} (${e[1]})<br>`

})

html+="</div>"

document.getElementById(id).innerHTML=html

}

loadData().then(render)

</script>

</body>
</html>
