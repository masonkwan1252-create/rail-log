<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rail Log 0.05.1 iPhone 友好版</title>
<style>
body { font-family: sans-serif; margin: 15px; }
h1, h2 { margin-top: 20px; }
div, select, button { margin: 5px 0; font-size: 16px; }
select, button { padding: 6px 10px; }
table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; margin-top: 10px; }
th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; white-space: nowrap; }
button { cursor: pointer; }
</style>
</head>
<body>

<h1>Rail Log 0.05.1</h1>

<h2>新增乘車紀錄</h2>
<div>
  公司: <select id="companySelect"></select>
  路線: <select id="lineSelect"></select>
  上車站: <select id="fromSelect"></select>
  下車站: <select id="toSelect"></select>
  <button onclick="addRecord()">加入紀錄</button>
</div>

<h2>乘車紀錄</h2>
<table id="recordsTable">
  <tr><th>公司</th><th>路線</th><th>上車站</th><th>下車站</th><th>操作</th></tr>
</table>

<h2>路線征服率</h2>
<table id="lineStatsTable">
  <tr><th>路線</th><th>已征服站數</th><th>總站數</th><th>征服率</th></tr>
</table>

<script>
// ---- JSON 資料 ----
const companies = ["JR西日本"];
const linesStations = [
  {
    "company": "JR西日本",
    "line": "加古川線",
    "stations": [
      "加古川","日岡","神野","厄神","市場",
      "小野町","粟生","河合西","青野ヶ原","社町",
      "滝野","滝","西脇市","新西脇","比延",
      "日本へそ公園","黒田庄","本黒田","船町口","久下村",
      "谷川"
    ]
  }
];

// ---- 全局變數 ----
let records = [];
let lastToStation = null;

// ---- 初始化選單 ----
const companySelect = document.getElementById("companySelect");
const lineSelect = document.getElementById("lineSelect");
const fromSelect = document.getElementById("fromSelect");
const toSelect = document.getElementById("toSelect");

companies.forEach(c => {
  let opt = document.createElement("option");
  opt.text = c; opt.value = c;
  companySelect.add(opt);
});

function updateLineOptions() {
  lineSelect.innerHTML = "";
  const selectedCompany = companySelect.value;
  linesStations.filter(l => l.company === selectedCompany)
    .forEach(l => {
      let opt = document.createElement("option");
      opt.text = l.line; opt.value = l.line;
      lineSelect.add(opt);
    });
  updateStationOptions();
}

function updateStationOptions() {
  fromSelect.innerHTML = "";
  toSelect.innerHTML = "";
  const selectedLine = lineSelect.value;
  const line = linesStations.find(l => l.line === selectedLine);
  if(!line) return;

  line.stations.forEach(st => {
    let opt1 = document.createElement("option");
    opt1.text = st; opt1.value = st;
    fromSelect.add(opt1);

    let opt2 = document.createElement("option");
    opt2.text = st; opt2.value = st;
    toSelect.add(opt2);
  });

  if(lastToStation && Array.from(fromSelect.options).some(o=>o.value===lastToStation)) {
    fromSelect.value = lastToStation;
  }
}

companySelect.onchange = updateLineOptions;
lineSelect.onchange = updateStationOptions;

updateLineOptions(); // 初始載入

// ---- 增加乘車紀錄 ----
function addRecord() {
  const rec = {
    company: companySelect.value,
    line: lineSelect.value,
    from: fromSelect.value,
    to: toSelect.value
  };
  records.push(rec);
  lastToStation = rec.to;
  renderRecords();
  renderLineStats();
}

// ---- 渲染紀錄 ----
function renderRecords() {
  const table = document.getElementById("recordsTable");
  table.innerHTML = `<tr><th>公司</th><th>路線</th><th>上車站</th><th>下車站</th><th>操作</th></tr>`;
  records.forEach((r,i) => {
    const tr = table.insertRow();
    tr.insertCell(0).innerText = r.company;
    tr.insertCell(1).innerText = r.line;
    tr.insertCell(2).innerText = r.from;
    tr.insertCell(3).innerText = r.to;
    const delBtn = document.createElement("button");
    delBtn.innerText="刪除"; delBtn.onclick=()=>{records.splice(i,1); renderRecords(); renderLineStats();}
    tr.insertCell(4).appendChild(delBtn);
  });
}

// ---- 計算與渲染征服率 ----
function renderLineStats() {
  const table = document.getElementById("lineStatsTable");
  table.innerHTML = `<tr><th>路線</th><th>已征服站數</th><th>總站數</th><th>征服率</th></tr>`;
  linesStations.forEach(line=>{
    let conquered = new Set();
    records.filter(r=>r.line===line.line).forEach(r=>{
      let stations = line.stations;
      let start = stations.indexOf(r.from);
      let end = stations.indexOf(r.to);
      if(start===-1||end===-1) return;
      if(start>end) [start,end]=[end,start];
      for(let i=start;i<=end;i++) conquered.add(stations[i]);
    });
    let percent = Math.round(conquered.size/line.stations.length*100);
    const tr = table.insertRow();
    tr.insertCell(0).innerText = line.line;
    tr.insertCell(1).innerText = conquered.size;
    tr.insertCell(2).innerText = line.stations.length;
    tr.insertCell(3).innerText = percent+"%";
  });
}
</script>

</body>
</html>
