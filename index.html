<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rail Log V0.04</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#f2f2f2;
}

header{
background:#222;
color:white;
padding:16px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.trip{
border-bottom:1px solid #eee;
padding:8px 0;
}

.dategroup{
font-weight:bold;
margin-top:10px;
}

.statHeader{
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<header>🚆 Rail Log V0.04</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">

<datalist id="companyList"></datalist>

<label>路線</label>
<input id="line" list="lineList">

<datalist id="lineList"></datalist>

<label>車型</label>
<input id="train" list="trainList">

<datalist id="trainList"></datalist>

<label>上車站</label>
<input id="from">

<label>下車站</label>
<input id="to">

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>

<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>
<div id="companyStats"></div>
<div id="trainStats"></div>
<div id="stationStats"></div>

</div>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("railTrips")||"[]")

let companies=[]
let lines=[]
let trains=[]

date.valueAsDate=new Date()

async function loadData(){

companies=await (await fetch("companies.json")).json()
lines=await (await fetch("lines.json")).json()
trains=await (await fetch("trainTypes.json")).json()

fillCompany()
fillTrain()

}

function fillCompany(){

companyList.innerHTML=""

companies.forEach(c=>{

let opt=document.createElement("option")

opt.value=c

companyList.appendChild(opt)

})

}

function fillTrain(){

trainList.innerHTML=""

trains.forEach(t=>{

let opt=document.createElement("option")

opt.value=t

trainList.appendChild(opt)

})

}

company.addEventListener("input",()=>{

let c=company.value

lineList.innerHTML=""

lines
.filter(l=>l.company===c)
.forEach(l=>{

let opt=document.createElement("option")

opt.value=l.name

lineList.appendChild(opt)

})

})

loadData()

function normalizeTrain(train){

if(!train) return ""

let t=train.trim()

let dash=t.match(/^([A-Za-z]\d+)-(\d+)$/)

if(dash){
return dash[1]+"系"+dash[2]+"番台"
}

let series=t.match(/^([A-Za-z]\d+系)(\d+)$/)

if(series){
return series[1]+series[2]+"番台"
}

return t

}

function parseTrain(train){

let type=""
let sub=""

let m1=train.match(/([A-Za-z]*\d+)(系|形)/)

if(m1){
type=m1[1]+m1[2]
}

let m2=train.match(/(\d+)(番台)?$/)

if(m2){
sub=m2[1]
}

return {type,sub}

}

function saveTrip(){

let trip={
date:date.value,
company:company.value,
line:line.value,
train:normalizeTrain(train.value),
from:from.value,
to:to.value
}

trips.push(trip)

localStorage.setItem("railTrips",JSON.stringify(trips))

clearForm()

render()

}

function clearForm(){

let lastTo=to.value

line.value=""
train.value=""
to.value=""

from.value=lastTo

date.valueAsDate=new Date()

}

function render(){

tripList.innerHTML=""

let sorted=[...trips].sort((a,b)=>b.date.localeCompare(a.date))

let lastDate=""

sorted.forEach(t=>{

if(t.date!==lastDate){

let d=document.createElement("div")

d.className="dategroup"

d.innerText=t.date

tripList.appendChild(d)

lastDate=t.date

}

let div=document.createElement("div")

div.className="trip"

div.innerHTML=

t.company+" "+t.line+" "+t.train+

"<br>"+t.from+" → "+t.to

tripList.appendChild(div)

})

stats()

}

function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let trainCount={}
let stationCount={}

trips.forEach(t=>{

companyCount[t.company]=(companyCount[t.company]||0)+1

let p=parseTrain(t.train)

if(p.type){
trainCount[p.type]=(trainCount[p.type]||0)+1
}

stationCount[t.from]=(stationCount[t.from]||0)+1
stationCount[t.to]=(stationCount[t.to]||0)+1

})

renderCompany(companyCount)
renderTrain(trainCount)
renderStationRanking(stationCount)

}

function renderCompany(data){

let entries=Object.entries(data)

entries.sort((a,b)=>b[1]-a[1])

let html="<div class='statHeader'>鉄道公司</div>"

entries.forEach(e=>{
html+=e[0]+" ("+e[1]+")<br>"
})

companyStats.innerHTML=html

}

function renderTrain(data){

let entries=Object.entries(data)

entries.sort((a,b)=>b[1]-a[1])

let html="<div class='statHeader'>車型</div>"

entries.forEach(e=>{
html+=e[0]+" ("+e[1]+")<br>"
})

trainStats.innerHTML=html

}

function renderStationRanking(data){

let entries=Object.entries(data)

entries.sort((a,b)=>b[1]-a[1])

let html="<div class='statHeader'>車站排行榜</div>"

entries.slice(0,20).forEach((s,i)=>{

html+=(i+1)+" "+s[0]+" ("+s[1]+")<br>"

})

stationStats.innerHTML=html

}

render()

</script>

</body>
</html>
