<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Rail Log V0.04.3</title>

<style>

body{
font-family:-apple-system;
margin:0;
background:#f2f2f2;
}

header{
background:#222;
color:white;
padding:16px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:6px 10px;
margin-right:6px;
font-size:14px;
}

.trip{
border-bottom:1px solid #eee;
padding:8px 0;
}

.dategroup{
font-weight:bold;
margin-top:10px;
}

.statHeader{
font-weight:bold;
margin-top:10px;
}

.clickable{
color:#007aff;
cursor:pointer;
}

.sub{
margin-left:14px;
font-size:14px;
}

</style>
</head>

<body>

<header>🚆 Rail Log V0.04.3</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">
<datalist id="companyList"></datalist>

<label>路線</label>
<input id="line" list="lineList">
<datalist id="lineList"></datalist>

<label>車型</label>
<input id="train" list="trainList">
<datalist id="trainList"></datalist>

<label>上車站</label>
<input id="from" list="stationList">

<label>下車站</label>
<input id="to" list="stationList">
<datalist id="stationList"></datalist>

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>

<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div id="total"></div>
<div id="companyStats"></div>
<div id="trainStats"></div>
<div id="lineStats"></div>
<div id="stationStats"></div>

</div>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("railTrips")||"[]")

let companies=[]
let lines=[]
let stations=[]
let trains=[]

let editIndex=null

date.valueAsDate=new Date()

async function loadData(){

companies=await (await fetch("companies.json")).json()
lines=await (await fetch("lines.json")).json()
stations=await (await fetch("stations.json")).json()
trains=await (await fetch("trainTypes.json")).json()

fillList(companyList,companies)
fillList(stationList,stations)
fillList(trainList,trains)

}

function fillList(list,data){

list.innerHTML=""

data.forEach(v=>{

let opt=document.createElement("option")
opt.value=v
list.appendChild(opt)

})

}

company.addEventListener("input",()=>{

lineList.innerHTML=""

lines
.filter(l=>l.company===company.value)
.forEach(l=>{

let opt=document.createElement("option")
opt.value=l.name
lineList.appendChild(opt)

})

})

loadData()

function normalizeTrain(train){

if(!train) return ""

let t=train.trim()

let dash=t.match(/^([A-Za-z]\d+)-(\d+)$/)

if(dash){
return dash[1]+"系"+dash[2]+"番台"
}

let series=t.match(/^([A-Za-z]\d+系)(\d+)$/)

if(series){
return series[1]+series[2]+"番台"
}

return t

}

function saveTrip(){

let trip={
date:date.value,
company:company.value,
line:line.value,
train:normalizeTrain(train.value),
from:from.value,
to:to.value
}

if(editIndex!==null){

trips[editIndex]=trip
editIndex=null

}else{

trips.push(trip)

}

localStorage.setItem("railTrips",JSON.stringify(trips))

clearForm()
render()

}

function clearForm(){

let lastTo=to.value

line.value=""
train.value=""
to.value=""

if(lastTo){
from.value=lastTo
}

date.valueAsDate=new Date()

}

function deleteTrip(i){

if(confirm("刪除記錄？")){

trips.splice(i,1)
localStorage.setItem("railTrips",JSON.stringify(trips))
render()

}

}

function editTrip(i){

let t=trips[i]

date.value=t.date
company.value=t.company
line.value=t.line
train.value=t.train
from.value=t.from
to.value=t.to

editIndex=i

window.scrollTo({top:0,behavior:"smooth"})

}

function render(){

tripList.innerHTML=""

let sorted=[...trips].sort((a,b)=>b.date.localeCompare(a.date))

let lastDate=""

sorted.forEach(t=>{

let i=trips.indexOf(t)

if(t.date!==lastDate){

let d=document.createElement("div")
d.className="dategroup"
d.innerText=t.date

tripList.appendChild(d)

lastDate=t.date

}

let div=document.createElement("div")

div.className="trip"

div.innerHTML=
t.company+" "+t.line+" "+t.train+
"<br>"+t.from+" → "+t.to+
"<br>"+
"<button class='smallbtn' onclick='editTrip("+i+")'>✏️修改</button>"+
"<button class='smallbtn' onclick='deleteTrip("+i+")'>🗑刪除</button>"

tripList.appendChild(div)

})

stats()

}

function stats(){

total.innerText="乘車次數："+trips.length

let companyCount={}
let trainCount={}
let lineCount={}
let stationCount={}

trips.forEach(t=>{

companyCount[t.company]=(companyCount[t.company]||0)+1
lineCount[t.line]=(lineCount[t.line]||0)+1

let type=t.train.match(/([A-Za-z]*\d+系|\d+形)/)

if(type){
trainCount[type[0]]=(trainCount[type[0]]||0)+1
}

stationCount[t.from]=(stationCount[t.from]||0)+1
stationCount[t.to]=(stationCount[t.to]||0)+1

})

renderStat(companyStats,"鉄道公司",companyCount)
renderStat(trainStats,"車型",trainCount)
renderStat(lineStats,"路線",lineCount)

let s=Object.entries(stationCount)
s.sort((a,b)=>b[1]-a[1])

let html="<b>車站排行榜</b><br>"

s.slice(0,20).forEach((v,i)=>{
html+=(i+1)+" "+v[0]+" ("+v[1]+")<br>"
})

stationStats.innerHTML=html

}

function renderStat(el,title,data){

let entries=Object.entries(data)
entries.sort((a,b)=>b[1]-a[1])

let id="stat_"+title

let html="<b>"+title+"</b>："+entries.length+
" <span class='clickable' onclick="toggle('"+id+"')">查看</span>"

html+="<div id='"+id+"' style='display:none'>"

entries.forEach(e=>{
html+=e[0]+" ("+e[1]+")<br>"
})

html+="</div>"

el.innerHTML=html

}

function toggle(id){

let el=document.getElementById(id)

el.style.display=
el.style.display==="none"?"block":"none"

}

render()

</script>

</body>
</html>
