<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rail Log</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont;
margin:0;
background:#f5f5f5;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.list-item{
padding:10px;
border-bottom:1px solid #eee;
}

.stat{
font-size:18px;
margin:8px 0;
}

</style>
</head>

<body>

<header>🚆 Rail Log</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" placeholder="JR東日本">

<label>路線</label>
<input id="line" placeholder="中央線">

<label>車型</label>
<input id="train" placeholder="E233-0 或 キハ40">

<label>上車站</label>
<input id="from">

<label>下車站</label>
<input id="to">

<button onclick="addTrip()">儲存</button>

</div>

<div class="card">

<h3>乘車記錄</h3>
<div id="tripList"></div>

</div>

<div class="card">

<h3>統計</h3>

<div class="stat" id="totalTrips"></div>
<div class="stat" id="companyStats"></div>
<div class="stat" id="trainStats"></div>

</div>

</div>

<script>

let trips = JSON.parse(localStorage.getItem("railTrips") || "[]")

document.getElementById("date").valueAsDate = new Date()

function addTrip(){

let trip = {

date:document.getElementById("date").value,
company:document.getElementById("company").value,
line:document.getElementById("line").value,
train:document.getElementById("train").value,
from:document.getElementById("from").value,
to:document.getElementById("to").value

}

trips.push(trip)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

function render(){

let list=document.getElementById("tripList")
list.innerHTML=""

trips.forEach(t=>{

let div=document.createElement("div")
div.className="list-item"

div.innerHTML=
t.date+" | "+
t.company+" "+
t.line+" "+
t.train+
"<br>"+t.from+" → "+t.to

list.appendChild(div)

})

document.getElementById("totalTrips").innerText="乘車次數："+trips.length

let companyCount={}
let trainCount={}

trips.forEach(t=>{

companyCount[t.company]=(companyCount[t.company]||0)+1

let type=t.train.split("-")[0]

trainCount[type]=(trainCount[type]||0)+1

})

let companyText="鉄道公司： "
for(let c in companyCount){

companyText+=c+"("+companyCount[c]+") "

}

document.getElementById("companyStats").innerText=companyText

let trainText="車型： "
for(let t in trainCount){

trainText+=t+"("+trainCount[t]+") "

}

document.getElementById("trainStats").innerText=trainText

}

render()

</script>

</body>
</html>
