}
<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rail Log V0.04.2</title>

<style>
body{
font-family:-apple-system;
margin:0;
background:#f2f2f2;
}

header{
background:#222;
color:white;
padding:16px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
font-size:16px;
}

button{
background:#007aff;
color:white;
border:none;
border-radius:8px;
}

.smallbtn{
width:auto;
padding:6px 10px;
margin-right:6px;
font-size:14px;
}

.trip{
border-bottom:1px solid #eee;
padding:8px 0;
}

.dategroup{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<header>🚆 Rail Log V0.04.2</header>

<div class="container">

<div class="card">

<h3>新增乘車</h3>

<label>日期</label>
<input type="date" id="date">

<label>鉄道公司</label>
<input id="company" list="companyList">
<datalist id="companyList"></datalist>

<label>路線</label>
<input id="line" list="lineList">
<datalist id="lineList"></datalist>

<label>車型</label>
<input id="train" list="trainList">
<datalist id="trainList"></datalist>

<label>上車站</label>
<input id="from" list="stationList">

<label>下車站</label>
<input id="to" list="stationList">
<datalist id="stationList"></datalist>

<button onclick="saveTrip()">儲存</button>

</div>

<div class="card">
<h3>乘車記錄</h3>
<div id="tripList"></div>
</div>

</div>

<script>

let trips=JSON.parse(localStorage.getItem("railTrips")||"[]")

let companies=[]
let lines=[]
let stations=[]
let trains=[]

date.valueAsDate=new Date()

async function loadData(){

companies=await (await fetch("companies.json")).json()
lines=await (await fetch("lines.json")).json()
stations=await (await fetch("stations.json")).json()
trains=await (await fetch("trainTypes.json")).json()

fillCompany()
fillStations()
fillTrains()

}

function fillCompany(){

companyList.innerHTML=""

companies.forEach(c=>{
let o=document.createElement("option")
o.value=c
companyList.appendChild(o)
})

}

function fillStations(){

stationList.innerHTML=""

stations.forEach(s=>{
let o=document.createElement("option")
o.value=s
stationList.appendChild(o)
})

}

function fillTrains(){

trainList.innerHTML=""

trains.forEach(t=>{
let o=document.createElement("option")
o.value=t
trainList.appendChild(o)
})

}

company.addEventListener("input",()=>{

lineList.innerHTML=""

lines
.filter(l=>l.company===company.value)
.forEach(l=>{

let o=document.createElement("option")
o.value=l.name

lineList.appendChild(o)

})

})

function normalizeTrain(t){

if(!t)return""

let m=t.match(/^([A-Za-z]*\d+系)(\d+)$/)

if(m){
return m[1]+m[2]+"番台"
}

return t

}

function saveTrip(){

let trip={

date:date.value,
company:company.value,
line:line.value,
train:normalizeTrain(train.value),
from:from.value,
to:to.value

}

trips.push(trip)

localStorage.setItem("railTrips",JSON.stringify(trips))

render()

}

function render(){

tripList.innerHTML=""

let sorted=[...trips].sort((a,b)=>b.date.localeCompare(a.date))

let lastDate=""

sorted.forEach(t=>{

if(t.date!==lastDate){

let d=document.createElement("div")
d.className="dategroup"
d.innerText=t.date

tripList.appendChild(d)

lastDate=t.date

}

let div=document.createElement("div")

div.className="trip"

div.innerText=
t.company+" "+t.line+" "+t.train+
" "+t.from+"→"+t.to

tripList.appendChild(div)

})

}

loadData()
render()

</script>

</body>
</html
